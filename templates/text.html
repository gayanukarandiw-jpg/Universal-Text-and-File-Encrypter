{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl w-full mx-auto animate__animated animate__fadeInUp">
    
    <a href="/" class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-white mb-6 group transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
        Back to Main Menu
    </a>

    <div class="glass-panel rounded-3xl p-6 md:p-8 shadow-2xl">
        <div class="flex items-center gap-3 mb-6 pb-4 border-b border-white/5">
            <div class="p-2.5 bg-indigo-500/10 text-indigo-400 rounded-xl">
                <i data-lucide="file-text" class="w-5 h-5"></i>
            </div>
            <div>
                <h2 class="text-xl font-bold text-white">String Encryption Suite</h2>
                <p class="text-xs text-slate-400">Iterative processing using localized Fernet matrices</p>
            </div>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-xl text-sm flex items-center gap-3 animate__animated animate__headShake">
            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Secret Encryption Key</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">
                        <i data-lucide="key" class="w-4 h-4"></i>
                    </span>
                    <input type="password" name="password" required placeholder="Enter custom passkey..." 
                           class="w-full pl-10 pr-4 py-3 bg-slate-900/60 border border-white/10 rounded-xl text-white focus:outline-none focus:border-indigo-500 transition-colors text-sm">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Target Payload Text</label>
                    <button type="button" onclick="pasteFromClipboard()" class="text-xs flex items-center gap-1 text-indigo-400 hover:text-indigo-300 transition-colors">
                        <i data-lucide="clipboard" class="w-3.5 h-3.5"></i> Paste Text
                    </button>
                </div>
                <textarea id="text_to_process" name="text_to_process" rows="5" required placeholder="Paste text to encrypt or generated ciphertext strings to decode here..."
                          class="w-full p-4 bg-slate-900/60 border border-white/10 rounded-xl text-white focus:outline-none focus:border-indigo-500 transition-colors text-sm font-mono resize-none"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button type="submit" name="action" value="encrypt" 
                        class="flex items-center justify-center gap-2 py-3 bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition-all rounded-xl text-sm font-semibold shadow-lg text-white">
                    <i data-lucide="lock" class="w-4 h-4"></i> Encrypt Payload
                </button>
                <button type="submit" name="action" value="decrypt" 
                        class="flex items-center justify-center gap-2 py-3 bg-slate-800 hover:bg-slate-700 active:scale-[0.98] transition-all border border-white/5 rounded-xl text-sm font-semibold text-white">
                    <i data-lucide="unlock" class="w-4 h-4"></i> Decrypt Cipher
                </button>
            </div>
        </form>

        {% if result %}
        <div class="mt-8 pt-6 border-t border-white/5 space-y-3 animate__animated animate__fadeIn">
            <div class="flex justify-between items-center">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Output Processing Result</span>
                <button onclick="copyToClipboard()" id="copyBtn" class="text-xs flex items-center gap-1.5 text-indigo-400 hover:text-indigo-300 font-medium transition-colors">
                    <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy Output
                </button>
            </div>
            <div id="resultBox" class="p-4 bg-emerald-950/20 border border-emerald-500/20 rounded-xl text-emerald-400 font-mono text-sm break-all max-h-48 overflow-y-auto">
                {{ result }}
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script>
    // Paste system utility
    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('text_to_process').value = text;
        } catch (err) {
            alert('⚠️ Clipboard permission denied by your browser.');
        }
    }

    // Copy system utility
    function copyToClipboard() {
        const text = document.getElementById('resultBox').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!`;
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy Output`;
                lucide.createIcons();
            }, 2000);
        });
    }
</script>
{% endblock %}
