<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>📁 Universal Secure File Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: radial-gradient(circle at 50% 50%, #1a1f29 0%, #0d1117 100%);
        min-height: 100vh;
        color: #ffffff;
        padding: 40px 0;
      }
      .crypto-box {
        background: rgba(22, 28, 39, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }
      .vault-title {
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .form-control {
        background: rgba(13, 17, 23, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff !important;
        border-radius: 12px;
        padding: 12px;
      }
      .form-control:focus {
        background: rgba(13, 17, 23, 0.9);
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
      }
      .cyber-btn {
        font-weight: 600;
        border-radius: 12px;
        padding: 12px 24px;
        transition: all 0.2s ease-in-out;
        border: none;
      }
      .btn-text-mode {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: #white;
      }
      .btn-text-mode:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
      }
      .btn-file-mode {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: #white;
      }
      .btn-file-mode:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="mb-4">
                    <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3">← Back to Main Framework</a>
                </div>

                {% if error %}
                <div class="alert alert-danger bg-danger text-white border-0 rounded-4 mb-4" role="alert">
                    {{ error }}
                </div>
                {% endif %}

                <div class="crypto-box">
                    <h2 class="vault-title mb-2 text-center">📁 Secure File Vault</h2>
                    <p class="text-center text-secondary small mb-4" style="font-family: 'JetBrains Mono', monospace;">BINARY COMPRESSION ENDPOINT</p>
                    
                    <form action="/file" method="POST" enctype="multipart/form-data" onsubmit="setTimeout(() => { document.getElementById('passwordField').value = ''; }, 100);">
                        <div class="mb-4">
                            <label class="form-label text-secondary fw-semibold">Target File Object:</label>
                            <input type="file" class="form-control" name="file_input" required>
                            <div class="form-text text-muted">Upload normal targets to encrypt, or raw .opcu archives to decrypt.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-secondary fw-semibold">Secret Authorization Key:</label>
                            <input type="password" class="form-control" id="passwordField" name="password" required placeholder="Enter private key passphrase">
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" name="action" value="encrypt" class="cyber-btn btn-text-mode flex-fill text-white">🔒 Lock File Data</button>
                            <button type="submit" name="action" value="decrypt" class="cyber-btn btn-file-mode flex-fill text-white">🔓 Unlock File Data</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
  </body>
</html>
