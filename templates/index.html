<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🔒 Universal File And Text Encrypter 🔒</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      /* Smooth animated tech gradient background */
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: radial-gradient(circle at 50% 50%, #1a1f29 0%, #0d1117 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }

      /* Cyber Card (Frosted Glass Effect) */
      .crypto-box {
        background: rgba(22, 28, 39, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 3rem 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }

      /* Title styling */
      .vault-title {
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Subtitle styling */
      .vault-subtitle {
        font-family: 'JetBrains+Mono', monospace;
        color: #6c7d93;
        font-size: 0.9rem;
      }

      /* Custom High-Tech Interactive Buttons */
      .cyber-btn {
        font-weight: 600;
        border-radius: 14px;
        padding: 14px 28px;
        width: 100%;
        max-width: 320px;
        transition: all 0.3ex ease-in-out;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-decoration: none !important;
      }

      /* Neon Emerald glow for Text Encryption */
      .btn-text-mode {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: #ffffff;
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
      }
      .btn-text-mode:hover {
        background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
        color: #ffffff;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
      }

      /* Neon Sapphire glow for File Encryption */
      .btn-file-mode {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: #ffffff;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
      }
      .btn-file-mode:hover {
        background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        color: #ffffff;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
      }

      /* Animated floating Shield Icon */
      .shield-icon {
        font-size: 3.5rem;
        display: inline-block;
        animation: float 4s ease-in-out infinite;
      }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
    </style>
  </head>
  <body>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                
                <div class="crypto-box text-center">
                    
                    <div class="shield-icon mb-2">🛡️</div>
                    
                    <h2 class="vault-title mb-1">
                        File & Text Encrypter
                    </h2>
                    
                    <p class="vault-subtitle mb-5">SECURE PROTOCOL ENGAGED</p>
                    
                    <div class="d-flex flex-column align-items-center gap-3">
                        
                        <a href="/text" class="cyber-btn btn-text-mode">
                            <span>🖹</span> Text Encryption Mode
                        </a>
                        
                        <a href="/file" class="cyber-btn btn-file-mode">
                            <span>📁</span> File Encryption Mode
                        </a>
                        
                    </div>
                    
                </div> </div>
        </div>
    </div>

  </body>
</html>
